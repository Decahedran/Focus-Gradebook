services:
  - type: web
    name: focus-gradebook
    env: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: focus-gradebook-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false

databases:
  - name: focus-gradebook-db
    plan: free
    databaseName: focus_gradebook
    user: focus_gradebook_user
